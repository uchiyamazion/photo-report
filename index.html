<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>写真報告書作成アプリ</title>
<style>
  :root{
    --steel-900:#101b26;
    --steel-800:#16232f;
    --steel-700:#1f3140;
    --steel-600:#2c4658;
    --steel-500:#41647c;
    --line:#33495a;
    --paper:#eef2f0;
    --paper-dim:#c9d3ce;
    --amber:#e8a13c;
    --amber-dim:#7a5a24;
    --danger:#c85a4a;
    --ok:#5ba97c;
    --radius:10px;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--steel-900);
    color:var(--paper);
    font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    min-height:100vh;
    padding-bottom:72px;
  }
  header{
    position:sticky; top:0; z-index:20;
    background:linear-gradient(180deg,var(--steel-800),var(--steel-800) 90%,transparent);
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
  }
  .brand{
    display:flex; align-items:baseline; gap:8px;
  }
  .brand .mark{
    font-family:"Courier New",monospace;
    font-size:12px; letter-spacing:.12em;
    color:var(--amber);
    border:1px solid var(--amber-dim);
    padding:2px 6px; border-radius:4px;
  }
  .brand h1{
    font-size:18px; margin:0; font-weight:700; letter-spacing:.02em;
  }
  nav.tabs{
    display:flex; gap:0; margin-top:12px;
    border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;
  }
  nav.tabs button{
    flex:1; padding:10px 8px; background:var(--steel-800); color:var(--paper-dim);
    border:none; font-size:14px; font-weight:600; cursor:pointer;
  }
  nav.tabs button.active{
    background:var(--steel-600); color:#fff;
  }
  main{ padding:16px; max-width:640px; margin:0 auto; }
  section{ display:none; }
  section.active{ display:block; }

  .card{
    background:var(--steel-800); border:1px solid var(--line);
    border-radius:var(--radius); padding:14px; margin-bottom:14px;
  }
  .card h2{
    font-size:13px; margin:0 0 10px; color:var(--amber);
    letter-spacing:.08em; text-transform:uppercase; font-weight:700;
  }
  label.field{ display:block; margin-bottom:10px; }
  label.field span{
    display:block; font-size:12px; color:var(--paper-dim); margin-bottom:4px;
  }
  input[type=text], input[type=date], input[type=datetime-local], select, textarea{
    width:100%; padding:10px 10px; background:var(--steel-900);
    border:1px solid var(--line); border-radius:8px; color:#fff; font-size:15px;
  }
  textarea{ resize:vertical; min-height:56px; }
  input::placeholder{ color:#5a7182; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:11px 16px; border-radius:8px; border:none;
    font-size:14px; font-weight:700; cursor:pointer;
  }
  .btn-amber{ background:var(--amber); color:#241a06; }
  .btn-outline{ background:transparent; color:var(--paper); border:1px solid var(--steel-500); }
  .btn-danger{ background:transparent; color:var(--danger); border:1px solid var(--danger); }
  .btn-block{ width:100%; }
  .btn:disabled{ opacity:.5; }

  .photo-item{
    display:flex; gap:10px; border:1px solid var(--line); border-radius:var(--radius);
    padding:10px; margin-bottom:10px; background:var(--steel-700);
  }
  .photo-thumb{
    width:88px; height:88px; border-radius:6px; background:var(--steel-900);
    background-size:cover; background-position:center; flex-shrink:0;
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    color:var(--paper-dim); font-size:11px; text-align:center;
  }
  .photo-fields{ flex:1; min-width:0; }
  .photo-fields .row{ display:flex; gap:6px; margin-bottom:6px; }
  .photo-fields select, .photo-fields input{ font-size:13px; padding:7px 8px; }
  .photo-index{
    font-family:"Courier New",monospace; font-size:11px; color:var(--amber);
    margin-bottom:4px;
  }
  .photo-remove{
    background:none; border:none; color:var(--danger); font-size:12px; cursor:pointer; padding:0;
  }
  .edit-link{
    background:none; border:none; color:var(--amber); font-size:12px; cursor:pointer; padding:0;
  }
  .master-actions{ display:flex; gap:12px; flex-shrink:0; }

  .empty{
    text-align:center; color:var(--paper-dim); font-size:13px; padding:22px 10px;
    border:1px dashed var(--steel-500); border-radius:var(--radius);
  }

  .fab{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg,var(--steel-900) 60%,transparent);
  }
  .fab-inner{ max-width:640px; margin:0 auto; display:flex; gap:8px; }

  .master-list{ list-style:none; margin:0; padding:0; }
  .master-list li{
    display:flex; justify-content:space-between; align-items:center;
    padding:9px 0; border-bottom:1px solid var(--line); font-size:14px;
  }
  .master-list li:last-child{ border-bottom:none; }
  .master-sub{ color:var(--paper-dim); font-size:12px; }

  .toast{
    position:fixed; top:14px; left:50%; transform:translateX(-50%);
    background:var(--steel-600); border:1px solid var(--amber);
    color:#fff; padding:10px 16px; border-radius:8px; font-size:13px;
    z-index:99; max-width:90vw; text-align:center;
  }
  .result-box{
    border:1px solid var(--ok); background:rgba(91,169,124,.12);
    border-radius:var(--radius); padding:14px; margin-top:14px;
  }
  .result-box a{ color:var(--ok); font-weight:700; word-break:break-all; }

  .add-row{ display:flex; gap:8px; }
  .add-row > *{ flex:1; }
  .add-row .btn{ flex:0 0 auto; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <span class="mark">SION</span>
    <h1>写真報告書作成</h1>
  </div>
  <nav class="tabs">
    <button data-tab="new" class="active">新規作成</button>
    <button data-tab="reports">保存済み一覧</button>
    <button data-tab="master">マスタ管理</button>
  </nav>
</header>

<main>

  <!-- ============ 新規作成 ============ -->
  <section id="tab-new" class="active">

    <div class="card">
      <h2>現場情報</h2>
      <label class="field">
        <span>物件名</span>
        <input type="text" id="siteName" placeholder="例）〇〇ビル空調更新工事">
      </label>
      <label class="field">
        <span>作業内容</span>
        <input type="text" id="workContent" placeholder="例）室外機交換工事">
      </label>
      <label class="field">
        <span>作業日</span>
        <input type="date" id="workDate">
      </label>
      <label class="field">
        <span>宛先会社</span>
        <select id="companySelect"></select>
        <div class="add-row" id="companyCustomRow" style="display:none; margin-top:8px;">
          <input type="text" id="companyCustom1" placeholder="会社名（自由入力）">
          <input type="text" id="companyCustom2" placeholder="支店・部署（任意）">
        </div>
      </label>
    </div>

    <div class="card">
      <h2>写真（<span id="photoCount">0</span>枚）</h2>
      <div id="photoList"></div>
      <div class="empty" id="photoEmpty">まだ写真がありません。下のボタンから追加してください。</div>

      <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple style="display:none">
      <input type="file" id="galleryInput" accept="image/*" multiple style="display:none">
      <div class="add-row" style="margin-top:8px;">
        <button class="btn btn-outline" id="addPhotoCameraBtn">📷 カメラで撮影</button>
        <button class="btn btn-outline" id="addPhotoGalleryBtn">🖼 写真を選択</button>
      </div>
    </div>

    <div id="resultArea"></div>
  </section>

  <!-- ============ 保存済み一覧 ============ -->
  <section id="tab-reports">
    <div class="card">
      <h2>作成済みの報告書</h2>
      <ul class="master-list" id="reportsList"></ul>
      <div class="empty" id="reportsEmpty" style="display:none;">まだ報告書が作成されていません。</div>
    </div>
  </section>

  <!-- ============ マスタ管理 ============ -->
  <section id="tab-master">

    <div class="card">
      <h2>型式 ／ 製造番号</h2>
      <div class="add-row" style="margin-bottom:10px;">
        <input type="text" id="newKata" placeholder="型式（例：PAC-XXX）">
        <input type="text" id="newSeizo" placeholder="製造番号（任意）">
      </div>
      <div class="add-row">
        <button class="btn btn-amber btn-block" id="addKataBtn">登録</button>
        <button class="btn btn-outline" id="cancelKataBtn" style="display:none;">キャンセル</button>
      </div>
      <ul class="master-list" id="kataMasterList" style="margin-top:12px;"></ul>
    </div>

    <div class="card">
      <h2>工事内容</h2>
      <div class="add-row" style="margin-bottom:10px;">
        <input type="text" id="newKoji" placeholder="工事内容（例：室外機据付）">
        <button class="btn btn-amber" id="addKojiBtn">登録</button>
        <button class="btn btn-outline" id="cancelKojiBtn" style="display:none;">キャンセル</button>
      </div>
      <ul class="master-list" id="kojiMasterList"></ul>
    </div>

    <div class="card">
      <h2>宛先会社（表紙に印字）</h2>
      <div class="add-row" style="margin-bottom:10px;">
        <input type="text" id="newCompany1" placeholder="会社名（例：〇〇株式会社）">
      </div>
      <div class="add-row" style="margin-bottom:10px;">
        <input type="text" id="newCompany2" placeholder="支店・部署（任意）">
      </div>
      <div class="add-row">
        <button class="btn btn-amber btn-block" id="addCompanyBtn">登録</button>
        <button class="btn btn-outline" id="cancelCompanyBtn" style="display:none;">キャンセル</button>
      </div>
      <ul class="master-list" id="companyMasterList" style="margin-top:12px;"></ul>
    </div>

  </section>

</main>

<div class="fab" id="fabNew">
  <div class="fab-inner">
    <button class="btn btn-outline" id="resetBtn">クリア</button>
    <button class="btn btn-amber btn-block" id="submitBtn">Excelを作成</button>
  </div>
</div>

<script>
/* ================= 設定 ================= */
// ★ GASをウェブアプリとしてデプロイした後、発行されたURLをここに設定してください
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzqkCPh4jiEYc2EeRUTPbdN7WnK9WHA2uqkOiZOxG_tdnRky7DVeV0yRYYBWikTyMdh/exec';

const MAX_IMAGE_PIXELS = 900000; // GASのinsertImage上限(100万画素)に余裕を持たせた値
const JPEG_QUALITY = 0.75;

/* ================= 状態 ================= */
let master = { kataList: [], seizoByKata: {}, kojiList: [], companyList: [] };
let photos = []; // { id, dataUrl, shotAt, place, kata, seizo, koji }
let editingKata = null;    // { kata, seizo } 編集中の元の値
let editingKoji = null;    // koji文字列（元の値）
let editingCompany = null; // { company1, company2 } 編集中の元の値
let editContext = null;    // { fileId } 保存済み報告書を編集中の場合にセット

/* ================= 初期化 ================= */
document.addEventListener('DOMContentLoaded', () => {
  initTabs();
  document.getElementById('addPhotoCameraBtn').addEventListener('click', () => {
    document.getElementById('cameraInput').click();
  });
  document.getElementById('addPhotoGalleryBtn').addEventListener('click', () => {
    document.getElementById('galleryInput').click();
  });
  document.getElementById('cameraInput').addEventListener('change', onPickPhoto);
  document.getElementById('galleryInput').addEventListener('change', onPickPhoto);
  document.getElementById('submitBtn').addEventListener('click', submitReport);
  document.getElementById('resetBtn').addEventListener('click', resetForm);
  document.getElementById('addKataBtn').addEventListener('click', addKataMaster);
  document.getElementById('addKojiBtn').addEventListener('click', addKojiMaster);
  document.getElementById('addCompanyBtn').addEventListener('click', addCompanyMaster);
  document.getElementById('cancelKataBtn').addEventListener('click', () => exitEditKata());
  document.getElementById('cancelKojiBtn').addEventListener('click', () => exitEditKoji());
  document.getElementById('cancelCompanyBtn').addEventListener('click', () => exitEditCompany());
  document.getElementById('companySelect').addEventListener('change', toggleCompanyCustomRow);

  const today = new Date();
  document.getElementById('workDate').value = today.toISOString().slice(0,10);

  loadMaster();
  loadReports();
  renderPhotoList();
});

function initTabs(){
  document.querySelectorAll('nav.tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('main section').forEach(s => s.classList.remove('active'));
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      document.getElementById('fabNew').style.display = btn.dataset.tab === 'new' ? 'block' : 'none';
      if (btn.dataset.tab === 'reports') loadReports();
    });
  });
}

/* ================= マスタ読み込み ================= */
async function loadMaster(){
  try{
    const res = await fetch(GAS_URL + '?action=master');
    const data = await res.json();
    if (data.ok){
      master = data;
      renderMasterLists();
    }
  }catch(err){
    console.error(err);
    toast('マスタデータの取得に失敗しました。GAS_URLの設定を確認してください。');
  }
}

function appendKataRow(ul, kata, seizo){
  const li = document.createElement('li');
  li.innerHTML = `<div><div>${escapeHtml(kata)}</div>
    <div class="master-sub">${escapeHtml(seizo) || '（製造番号未登録）'}</div></div>
    <div class="master-actions">
      <button class="edit-link">編集</button>
      <button class="photo-remove">削除</button>
    </div>`;
  li.querySelector('.edit-link').addEventListener('click', () => enterEditKata(kata, seizo));
  li.querySelector('.photo-remove').addEventListener('click', () => deleteKataMaster(kata, seizo));
  ul.appendChild(li);
}

function renderMasterLists(){
  const kataUl = document.getElementById('kataMasterList');
  kataUl.innerHTML = '';
  if (master.kataList.length === 0){
    kataUl.innerHTML = '<li class="master-sub">まだ登録がありません</li>';
  }
  master.kataList.forEach(kata => {
    const seizos = master.seizoByKata[kata] || [];
    if (seizos.length === 0){
      appendKataRow(kataUl, kata, '');
    } else {
      seizos.forEach(seizo => appendKataRow(kataUl, kata, seizo));
    }
  });

  const kojiUl = document.getElementById('kojiMasterList');
  kojiUl.innerHTML = '';
  if (master.kojiList.length === 0){
    kojiUl.innerHTML = '<li class="master-sub">まだ登録がありません</li>';
  }
  master.kojiList.forEach(koji => {
    const li = document.createElement('li');
    li.innerHTML = `<div>${escapeHtml(koji)}</div>
      <div class="master-actions">
        <button class="edit-link">編集</button>
        <button class="photo-remove">削除</button>
      </div>`;
    li.querySelector('.edit-link').addEventListener('click', () => enterEditKoji(koji));
    li.querySelector('.photo-remove').addEventListener('click', () => deleteKojiMaster(koji));
    kojiUl.appendChild(li);
  });

  const companyUl = document.getElementById('companyMasterList');
  companyUl.innerHTML = '';
  if (master.companyList.length === 0){
    companyUl.innerHTML = '<li class="master-sub">まだ登録がありません</li>';
  }
  master.companyList.forEach(c => {
    const li = document.createElement('li');
    li.innerHTML = `<div><div>${escapeHtml(c.company1)}</div>
      <div class="master-sub">${escapeHtml(c.company2) || '（支店・部署未登録）'}</div></div>
      <div class="master-actions">
        <button class="edit-link">編集</button>
        <button class="photo-remove">削除</button>
      </div>`;
    li.querySelector('.edit-link').addEventListener('click', () => enterEditCompany(c));
    li.querySelector('.photo-remove').addEventListener('click', () => deleteCompanyMaster(c));
    companyUl.appendChild(li);
  });
  renderCompanySelect();

  // 写真フォームのプルダウンも更新
  renderPhotoList();
}

function renderCompanySelect(){
  const sel = document.getElementById('companySelect');
  const prevValue = sel.value;
  sel.innerHTML = '<option value="">選択してください</option>' +
    master.companyList.map((c, i) =>
      `<option value="${i}">${escapeHtml(c.company1)}${c.company2 ? '　' + escapeHtml(c.company2) : ''}</option>`
    ).join('') +
    '<option value="__custom__">その他（自由入力）</option>';
  if (prevValue && (prevValue === '__custom__' || Number(prevValue) < master.companyList.length)) sel.value = prevValue;
  toggleCompanyCustomRow();
}

function toggleCompanyCustomRow(){
  const sel = document.getElementById('companySelect');
  document.getElementById('companyCustomRow').style.display = sel.value === '__custom__' ? 'flex' : 'none';
}

/* ================= 保存済み一覧 ================= */
async function loadReports(){
  try{
    const res = await fetch(GAS_URL + '?action=reports');
    const data = await res.json();
    if (data.ok){
      renderReportsList(data.reports || []);
    }
  }catch(err){
    console.error(err);
    toast('報告書一覧の取得に失敗しました');
  }
}

function renderReportsList(reports){
  const ul = document.getElementById('reportsList');
  const empty = document.getElementById('reportsEmpty');
  ul.innerHTML = '';
  empty.style.display = reports.length === 0 ? 'block' : 'none';

  reports.forEach(r => {
    const li = document.createElement('li');
    li.style.alignItems = 'flex-start';
    li.innerHTML = `
      <div>
        <div>${escapeHtml(r.siteName || '（物件名なし）')}</div>
        <div class="master-sub">作業日: ${escapeHtml(r.workDate || '-')} ／ 作成: ${escapeHtml(r.createdAt || '-')}</div>
      </div>
      <div class="master-actions" style="flex-direction:column; align-items:flex-end; gap:8px;">
        <button class="edit-link js-edit-report" style="background:none;border:none;">編集</button>
        <a href="${r.downloadUrl}" target="_blank" class="edit-link">Excel</a>
        ${r.spreadsheetUrl ? `<a href="${r.spreadsheetUrl}" target="_blank" class="edit-link">Sheet</a>` : ''}
        <button class="photo-remove">削除</button>
      </div>
    `;
    li.querySelector('.js-edit-report').addEventListener('click', () => editReport(r));
    li.querySelector('.photo-remove').addEventListener('click', () => deleteReport(r.fileId, r.siteName));
    ul.appendChild(li);
  });
}

async function editReport(report){
  if (photos.length > 0 && !confirm('現在入力中の内容は破棄されます。よろしいですか？')) return;

  try{
    const res = await fetch(GAS_URL + '?action=reportData&fileId=' + encodeURIComponent(report.fileId));
    const json = await res.json();
    if (!json.ok){ toast('データの取得に失敗しました: ' + (json.error || '')); return; }
    loadReportIntoForm(json.data, report.fileId);
  }catch(err){
    console.error(err);
    toast('データの取得に失敗しました');
  }
}

function loadReportIntoForm(data, fileId){
  editContext = { fileId };

  document.getElementById('siteName').value = data.siteName || '';
  document.getElementById('workContent').value = data.workContent || '';
  document.getElementById('workDate').value = data.workDate || '';

  // 宛先会社の一致するマスタを探す。なければ自由入力欄に入れる
  const matchIdx = master.companyList.findIndex(c =>
    c.company1 === (data.companyLine1 || '') && c.company2 === (data.companyLine2 || ''));
  if (matchIdx !== -1) {
    renderCompanySelect();
    document.getElementById('companySelect').value = String(matchIdx);
    toggleCompanyCustomRow();
  } else if (data.companyLine1) {
    renderCompanySelect();
    document.getElementById('companySelect').value = '__custom__';
    toggleCompanyCustomRow();
    document.getElementById('companyCustom1').value = data.companyLine1 || '';
    document.getElementById('companyCustom2').value = data.companyLine2 || '';
  }

  photos = (data.photos || []).map(p => ({
    id: 'p' + Date.now() + Math.random().toString(16).slice(2),
    dataUrl: p.dataUrl,
    shotAt: fromJapaneseDate(p.shotAt),
    place: p.place || '',
    kata: p.kata || '',
    seizo: p.seizo || '',
    koji: p.koji || '',
    kataCustom: !!(p.kata && !master.kataList.includes(p.kata)),
    seizoCustom: !!(p.seizo && !(master.seizoByKata[p.kata] || []).includes(p.seizo)),
    kojiCustom: !!(p.koji && !master.kojiList.includes(p.koji))
  }));
  renderPhotoList();

  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector('nav.tabs button[data-tab="new"]').classList.add('active');
  document.querySelectorAll('main section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-new').classList.add('active');
  document.getElementById('fabNew').style.display = 'block';

  updateEditBanner();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function exitEditMode(){
  editContext = null;
  updateEditBanner();
}

function updateEditBanner(){
  const btn = document.getElementById('submitBtn');
  let banner = document.getElementById('editBanner');
  if (editContext) {
    btn.textContent = '更新して保存';
    if (!banner) {
      banner = document.createElement('div');
      banner.id = 'editBanner';
      banner.style.cssText = 'background:var(--steel-600);border:1px solid var(--amber);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:10px;';
      banner.innerHTML = '<span>この報告書を編集中です</span><button class="btn btn-outline" id="exitEditBtn" style="padding:6px 10px;font-size:12px;">編集をやめる</button>';
      document.querySelector('#tab-new .card').parentNode.insertBefore(banner, document.querySelector('#tab-new .card'));
      document.getElementById('exitEditBtn').addEventListener('click', () => {
        if (confirm('編集をやめて新規作成に戻りますか？')) { resetForm(); exitEditMode(); }
      });
    }
  } else {
    btn.textContent = 'Excelを作成';
    if (banner) banner.remove();
  }
}

// "2026年7月13日" -> "2026-07-13"（<input type=date>用）
function fromJapaneseDate(str){
  if (!str) return '';
  const m = String(str).match(/^(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (!m) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${m[1]}-${pad(m[2])}-${pad(m[3])}`;
}

/* ================= 写真 ================= */
function onPickPhoto(e){
  const files = Array.from(e.target.files || []);
  if (files.length === 0) return;

  Promise.all(files.map(file => resizeImage(file, MAX_IMAGE_PIXELS, JPEG_QUALITY))).then(dataUrls => {
    const now = new Date();
    dataUrls.forEach(dataUrl => {
      photos.push({
        id: 'p' + Date.now() + Math.random().toString(16).slice(2),
        dataUrl,
        shotAt: formatDateOnly(now),
        place: '',
        kata: '',
        seizo: '',
        koji: '',
        kataCustom: false,
        seizoCustom: false,
        kojiCustom: false
      });
    });
    renderPhotoList();
    e.target.value = '';
  });
}

// 写真貼付セル(A:R × 14行)の縦横比。
// GoogleスプレッドシートのpxとExcelエクスポート後の実測px(426×294)から算出。
const PHOTO_ASPECT_RATIO = 426 / 294; // 約1.449 (横長)

function resizeImage(file, maxPixels, quality){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = reject;
    img.onload = () => {
      const srcW = img.width, srcH = img.height;
      const srcRatio = srcW / srcH;

      // セルの縦横比に合わせて中央部分だけを切り出す範囲を決める
      let cropW = srcW, cropH = srcH, cropX = 0, cropY = 0;
      if (srcRatio > PHOTO_ASPECT_RATIO) {
        // 横長すぎる → 左右を切る
        cropW = Math.round(srcH * PHOTO_ASPECT_RATIO);
        cropX = Math.round((srcW - cropW) / 2);
      } else {
        // 縦長すぎる → 上下を切る
        cropH = Math.round(srcW / PHOTO_ASPECT_RATIO);
        cropY = Math.round((srcH - cropH) / 2);
      }

      // 送信サイズ(画素数上限)に合わせて縮小
      let width = cropW, height = cropH;
      const totalPixels = width * height;
      if (totalPixels > maxPixels){
        const scale = Math.sqrt(maxPixels / totalPixels);
        width = Math.round(width * scale);
        height = Math.round(height * scale);
      }

      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, cropX, cropY, cropW, cropH, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderPhotoList(){
  const list = document.getElementById('photoList');
  const empty = document.getElementById('photoEmpty');
  document.getElementById('photoCount').textContent = photos.length;
  list.innerHTML = '';
  empty.style.display = photos.length === 0 ? 'block' : 'none';

  photos.forEach((p, idx) => {
    const div = document.createElement('div');
    div.className = 'photo-item';

    const kataIsCustom = p.kataCustom || (p.kata && !master.kataList.includes(p.kata));
    const kataOptions = ['<option value="">型式選択</option>']
      .concat(master.kataList.map(k => `<option value="${escapeHtml(k)}" ${(!kataIsCustom && p.kata===k)?'selected':''}>${escapeHtml(k)}</option>`))
      .concat([`<option value="__custom__" ${kataIsCustom?'selected':''}>その他（自由入力）</option>`])
      .join('');

    const seizoList = master.seizoByKata[p.kata] || [];
    const seizoIsCustom = p.seizoCustom || (p.seizo && !seizoList.includes(p.seizo));
    const seizoOptions = ['<option value="">製造番号選択</option>']
      .concat(seizoList.map(s => `<option value="${escapeHtml(s)}" ${(!seizoIsCustom && p.seizo===s)?'selected':''}>${escapeHtml(s)}</option>`))
      .concat([`<option value="__custom__" ${seizoIsCustom?'selected':''}>その他（自由入力）</option>`])
      .join('');

    const kojiIsCustom = p.kojiCustom || (p.koji && !master.kojiList.includes(p.koji));
    const kojiOptions = ['<option value="">工事内容選択</option>']
      .concat(master.kojiList.map(k => `<option value="${escapeHtml(k)}" ${(!kojiIsCustom && p.koji===k)?'selected':''}>${escapeHtml(k)}</option>`))
      .concat([`<option value="__custom__" ${kojiIsCustom?'selected':''}>その他（自由入力）</option>`])
      .join('');

    div.innerHTML = `
      <div class="photo-thumb" style="background-image:url('${p.dataUrl}')"></div>
      <div class="photo-fields">
        <div class="photo-index">写真 ${idx + 1} <button class="photo-remove" style="float:right;">削除</button></div>
        <div class="row">
          <input type="date" class="f-shotAt" value="${p.shotAt}">
        </div>
        <div class="row">
          <input type="text" class="f-place" placeholder="撮影場所" value="${escapeHtml(p.place)}">
        </div>
        <div class="row">
          <select class="f-kata">${kataOptions}</select>
          <select class="f-seizo">${seizoOptions}</select>
        </div>
        <div class="row" style="${kataIsCustom ? '' : 'display:none;'}">
          <input type="text" class="f-kata-custom" placeholder="型式を入力" value="${escapeHtml(kataIsCustom ? p.kata : '')}">
        </div>
        <div class="row" style="${seizoIsCustom ? '' : 'display:none;'}">
          <input type="text" class="f-seizo-custom" placeholder="製造番号を入力" value="${escapeHtml(seizoIsCustom ? p.seizo : '')}">
        </div>
        <div class="row">
          <select class="f-koji">${kojiOptions}</select>
        </div>
        <div class="row" style="${kojiIsCustom ? '' : 'display:none;'}">
          <input type="text" class="f-koji-custom" placeholder="工事内容を入力" value="${escapeHtml(kojiIsCustom ? p.koji : '')}">
        </div>
      </div>
    `;

    div.querySelector('.photo-remove').addEventListener('click', () => {
      photos = photos.filter(x => x.id !== p.id);
      renderPhotoList();
    });
    div.querySelector('.f-shotAt').addEventListener('change', e => p.shotAt = e.target.value);
    div.querySelector('.f-place').addEventListener('input', e => p.place = e.target.value);

    div.querySelector('.f-kata').addEventListener('change', e => {
      if (e.target.value === '__custom__') { p.kataCustom = true; p.kata = ''; }
      else { p.kataCustom = false; p.kata = e.target.value; }
      p.seizo = ''; p.seizoCustom = false;
      renderPhotoList();
    });
    div.querySelector('.f-kata-custom').addEventListener('input', e => { p.kata = e.target.value; });

    div.querySelector('.f-seizo').addEventListener('change', e => {
      if (e.target.value === '__custom__') { p.seizoCustom = true; p.seizo = ''; }
      else { p.seizoCustom = false; p.seizo = e.target.value; }
      renderPhotoList();
    });
    div.querySelector('.f-seizo-custom').addEventListener('input', e => { p.seizo = e.target.value; });

    div.querySelector('.f-koji').addEventListener('change', e => {
      if (e.target.value === '__custom__') { p.kojiCustom = true; p.koji = ''; }
      else { p.kojiCustom = false; p.koji = e.target.value; }
      renderPhotoList();
    });
    div.querySelector('.f-koji-custom').addEventListener('input', e => { p.koji = e.target.value; });

    list.appendChild(div);
  });
}

/* ================= 送信 ================= */
async function submitReport(){
  const siteName = document.getElementById('siteName').value.trim();
  const workContent = document.getElementById('workContent').value.trim();
  const workDate = document.getElementById('workDate').value;

  if (photos.length === 0){ toast('写真を1枚以上追加してください'); return; }

  const companyIdx = document.getElementById('companySelect').value;
  let company = null;
  if (companyIdx === '__custom__') {
    const c1 = document.getElementById('companyCustom1').value.trim();
    const c2 = document.getElementById('companyCustom2').value.trim();
    if (c1) company = { company1: c1, company2: c2 };
  } else if (companyIdx !== '') {
    company = master.companyList[Number(companyIdx)];
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '作成中…';

  const payload = {
    action: 'generateReport',
    siteName, workContent, workDate,
    companyLine1: company ? company.company1 : '',
    companyLine2: company ? company.company2 : '',
    editFileId: editContext ? editContext.fileId : undefined,
    photos: photos.map(p => ({
      dataUrl: p.dataUrl,
      shotAt: p.shotAt ? toJapaneseDate(p.shotAt) : '',
      place: p.place, kata: p.kata, seizo: p.seizo, koji: p.koji
    }))
  };

  try{
    const res = await postGas(payload);
    if (res.ok){
      document.getElementById('resultArea').innerHTML = `
        <div class="result-box">
          報告書を${editContext ? '更新' : '作成'}しました。<br>
          <a href="${res.downloadUrl}" target="_blank">Excel(.xlsx)をダウンロード</a>
        </div>`;
      exitEditMode();
      loadReports();
    } else {
      toast('作成に失敗しました: ' + (res.error || '不明なエラー'));
    }
  }catch(err){
    console.error(err);
    toast('通信に失敗しました。GAS_URLの設定・公開範囲を確認してください。');
  }finally{
    btn.disabled = false;
    btn.textContent = editContext ? '更新して保存' : 'Excelを作成';
  }
}

function resetForm(){
  if (photos.length && !confirm('入力内容をクリアしますか？')) return;
  photos = [];
  document.getElementById('siteName').value = '';
  document.getElementById('workContent').value = '';
  document.getElementById('resultArea').innerHTML = '';
  renderPhotoList();
}

/* ================= 共通 ================= */
async function postGas(body){
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(body) // text/plain送信でCORSプリフライトを回避
  });
  return res.json();
}

function formatDateOnly(d){
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

// "2026-07-13" -> "2026年7月13日"
function toJapaneseDate(dateStr){
  const m = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return dateStr;
  return `${m[1]}年${Number(m[2])}月${Number(m[3])}日`;
}

function escapeHtml(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let toastTimer;
function toast(msg){
  let el = document.querySelector('.toast');
  if (!el){
    el = document.createElement('div');
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.remove(), 3200);
}
